services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: withdrawals
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d withdrawals"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_ADDRESS: ":18080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/withdrawals?sslmode=disable
      API_TOKEN: local-dev-token
    ports:
      - "18080:18080"
